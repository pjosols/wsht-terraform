# CI workflow: validate, test, and scan all Terraform modules.
# Runs on push to main and all pull requests.
# Validate job skips cloudfront and waf (provider alias incompatible with standalone validate).
# Test job includes all modules using terraform test with mock providers.
# Checkov scans all modules for security and best-practice violations.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # cloudfront and waf declare configuration_aliases = [aws.us_east_1] and cannot
        # be validated standalone — they are covered by terraform test via mock_provider.
        module: [acm, apigw, cognito, kms, lambda_container, monitoring, s3_bucket]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: fmt check
        run: terraform fmt -check -recursive
        working-directory: modules/${{ matrix.module }}
      - name: init
        run: terraform init -backend=false
        working-directory: modules/${{ matrix.module }}
      - name: validate
        run: terraform validate
        working-directory: modules/${{ matrix.module }}

  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        module: [acm, apigw, cloudfront, cognito, kms, lambda_container, monitoring, s3_bucket, waf]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: init
        run: terraform init -backend=false
        working-directory: modules/${{ matrix.module }}
      - name: test
        run: terraform test
        working-directory: modules/${{ matrix.module }}

  checkov:
    name: Checkov
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: modules
          config_file: .checkov.yaml
          framework: terraform
