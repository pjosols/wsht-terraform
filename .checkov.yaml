skip-check:
  # CKV_AWS_356: KMS key policies use "resources = [\"*\"]" which AWS KMS interprets
  # as "this key only" — it is not a wildcard over all KMS keys. The key ARN is
  # unavailable at policy-document evaluation time (chicken-and-egg with key creation),
  # so resource-level scoping is structurally impossible.
  - CKV_AWS_356
  # CKV_AWS_174: CloudFront viewer_certificate uses TLSv1.2_2021 for all custom-cert
  # distributions (when aliases are set). The cloudfront_default_certificate path does
  # not accept minimum_protocol_version — AWS rejects it. Checkov cannot evaluate the
  # conditional and flags the null branch as non-compliant.
  - CKV_AWS_174
  # CKV_AWS_342: The WAF web ACL has a rate-limit rule with action { block {} } at
  # priority 0, plus AWS managed rule groups using override_action { none {} }.
  # Checkov does not recognise override_action as a valid action type for managed rule
  # group rules and incorrectly flags the resource as having no actions configured.
  - CKV_AWS_342
  # CKV_AWS_374: The CloudFront module defaults to restriction_type = "none" for global
  # access, which is intentional. Callers opt in to geo restrictions via
  # geo_restriction_type ("whitelist"/"blacklist") and geo_restriction_locations.
  # Checkov cannot evaluate the variable default as a deliberate choice.
  - CKV_AWS_374
  # CKV_AWS_192: AWSManagedRulesKnownBadInputsRuleSet (which includes Log4j/CVE-2021-44228
  # protection) is included in default_managed_rules at priority 2 and applied via a
  # dynamic block. Checkov cannot statically resolve the locals map + dynamic block
  # pattern and incorrectly reports the rule group as absent.
  - CKV_AWS_192
  # CKV_AWS_310: CloudFront origin failover is optional — callers configure it via
  # failover_origin variable. Not every distribution needs a failover origin group.
  - CKV_AWS_310
  # CKV_AWS_338: Lambda log group retention defaults to 30 days. Caller-controlled
  # via log_retention_days variable. Inline checkov:skip comment on the resource.
  - CKV_AWS_338
  # CKV_AWS_272: Code signing is not supported for container-image Lambda functions
  # (package_type = "Image"). Inline checkov:skip comment on the resource.
  - CKV_AWS_272
  # CKV2_AWS_31: WAF logging requires a Kinesis Firehose or CloudWatch log group
  # owned outside the WAF module. Cross-resource check cannot be satisfied within
  # the module boundary — caller wires logging separately.
  - CKV2_AWS_31
  # CKV2_AWS_32: CloudFront module accepts response_headers_policy_id as a variable.
  # Checkov cannot statically resolve the variable reference and flags it as missing.
  - CKV2_AWS_32
  # CKV_AWS_144: S3 cross-region replication is not required for every bucket.
  # Callers enable CRR at the application layer when needed.
  - CKV_AWS_144
  # CKV2_AWS_47: Cross-resource check expects WAF Web ACL with Log4j protection
  # attached to CloudFront. The WAF module includes AWSManagedRulesKnownBadInputsRuleSet
  # but Checkov cannot trace the web_acl_id reference across modules.
  - CKV2_AWS_47
